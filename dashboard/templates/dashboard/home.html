<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        .card { border: 1px solid #ccc; padding: 20px; display: inline-block; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{ title }}</h1>
        <p>Добро пожаловать в систему автоматизации!</p>
        <p>Статус: <strong>{{ price }}</strong></p>
    </div>
</body>
</html>
